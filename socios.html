<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADARN | Hub Estratégico - Área do Sócio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
    :root {
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --premium-gold: linear-gradient(135deg, #FFC107, #FF9800);
    }

    body { background-color: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* Efeito de Iluminação de Fundo */
    .ambient-glow {
        position: fixed; top: -10%; left: 50%; transform: translateX(-50%);
        width: 80vw; height: 50vh;
        background: radial-gradient(circle, rgba(131, 46, 255, 0.08) 0%, transparent 70%);
        pointer-events: none; z-index: -1;
    }

    /* Header Superior Luxo */
    header {
        padding: 20px 40px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid var(--glass-border);
        backdrop-filter: blur(10px); background: rgba(0,0,0,0.4);
    }

    .socio-badge {
        background: var(--premium-gold); color: #000;
        padding: 5px 15px; border-radius: 30px;
        font-size: 10px; font-weight: 900; text-transform: uppercase;
        letter-spacing: 1.5px; box-shadow: 0 0 20px rgba(255, 193, 7, 0.2);
    }

    /* Barra de Comando (Dashboard Header) */
    .dashboard-ctrl {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 16px; padding: 15px 25px;
        margin: 30px 40px; display: flex; align-items: center;
        justify-content: space-between; gap: 20px;
        backdrop-filter: blur(20px);
    }

    /* Botões de Navegação (Tabs) Estilo Apple */
    .nav-tabs {
        display: flex; background: rgba(0,0,0,0.4);
        padding: 5px; border-radius: 12px; border: 1px solid var(--glass-border);
    }

    .view-btn {
        background: transparent; border: none; color: #888;
        padding: 10px 20px; border-radius: 8px; cursor: pointer;
        font-size: 13px; font-weight: 600; transition: 0.3s;
    }

    .view-btn.active {
        background: rgba(255,255,255,0.07); color: #fff;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* Botões de Ação */
    .action-group { display: flex; gap: 10px; align-items: center; }

    .btn-import {
        background: transparent; border: 1px solid var(--glass-border);
        color: #aaa; padding: 10px 18px; border-radius: 10px;
        font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }

    .btn-import:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: #666; }

    .btn-create {
        background: #fff; color: #000; border: none;
        padding: 12px 24px; border-radius: 12px;
        font-size: 13px; font-weight: 800; cursor: pointer;
        display: flex; align-items: center; gap: 8px;
        transition: 0.3s; box-shadow: 0 10px 25px rgba(255,255,255,0.1);
    }

    .btn-create:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255,255,255,0.2); }

    /* Kanban Premium */
    .kanban-socio-board { padding: 0 40px 40px 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }

    .kanban-socio-col {
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--glass-border);
        border-radius: 24px; padding: 25px;
        min-height: 70vh; display: flex; flex-direction: column;
    }

    .kanban-col-header {
        font-size: 12px; font-weight: 800; text-transform: uppercase;
        letter-spacing: 2px; margin-bottom: 25px; display: flex;
        align-items: center; justify-content: space-between;
    }

    .status-badge-count {
        background: rgba(255,255,255,0.05); padding: 4px 10px;
        border-radius: 20px; font-size: 10px; color: #666;
    }

    /* Cards no Kanban */
    .kanban-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px; padding: 20px; margin-bottom: 15px;
        transition: 0.3s; cursor: pointer;
    }

    .kanban-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(131, 46, 255, 0.3);
        transform: scale(1.02);
    }

    /* Estilo para inputs de filtros */
    .premium-select {
        background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
        color: #fff; padding: 10px 15px; border-radius: 10px;
        font-size: 13px; outline: none; cursor: pointer;
    }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div class="container" style="display: none;" id="conteudo-restrito">
        
        <div class="ambient-glow"></div>

        <header>
            <div class="brand-container">
                <div class="logo-text">CADARN <span>HUB</span></div>
                <div class="socio-badge">Acesso VIP Sócio</div>
            </div>
            <div class="header-controls">
                <button class="btn-import" onclick="logout()" style="cursor: pointer;">Sair</button>
                <a href="index.html" class="btn-create" style="text-decoration: none; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border);">← Voltar ao Hub</a>
            </div>
        </header>

        <div class="dashboard-ctrl">
            <div class="nav-tabs">
                <button class="view-btn active" id="tab-btn-projetos" onclick="switchTab('projetos')">📊 Pipeline</button>
                <button class="view-btn" id="tab-btn-pessoas" onclick="switchTab('pessoas')">👥 Workload</button>
                <button class="view-btn" id="tab-btn-cronograma" onclick="switchTab('cronograma')">📈 Cronograma</button>
                <button class="view-btn" id="tab-btn-calendario" onclick="switchTab('calendario')">📅 Calendário</button>
            </div>

            <div class="action-group">
                <select id="filtro-responsavel" class="premium-select" onchange="aplicarFiltros()">
                    <option value="">Toda a Equipe</option>
                </select>
                
                <div style="display: flex; gap: 8px;">
                    <input type="file" id="file-import-pipe" accept=".csv" style="display:none" onchange="importarDados(event, 'pipe')">
                    <input type="file" id="file-import-projetos" accept=".csv" style="display:none" onchange="importarDados(event, 'projetos')">
                    
                    <button class="btn-import" onclick="document.getElementById('file-import-pipe').click()">📥 Pipe</button>
                    <button class="btn-import" onclick="document.getElementById('file-import-projetos').click()">📂 Projetos</button>
                </div>
                
                <button class="btn-create" onclick="novoProjetoSocio()">
                    <span style="font-size: 18px; margin-right: 5px;">+</span> Criar Projeto
                </button>
            </div>
        </div>

        <div id="view-projetos" class="kanban-socio-board fade-view">
            <div class="kanban-socio-col">
                <div class="kanban-col-header" style="color: #ffc107;">
                    <span>🤝 Negociação</span>
                    <span class="status-badge-count" id="count-negociacao">0</span>
                </div>
                <div class="kanban-dropzone" id="col-negociacao" data-status="negociacao"></div>
            </div>
            <div class="kanban-socio-col">
                <div class="kanban-col-header" style="color: #b68aff;">
                    <span>🚀 Delivery</span>
                    <span class="status-badge-count" id="count-andamento">0</span>
                </div>
                <div class="kanban-dropzone" id="col-andamento" data-status="andamento"></div>
            </div>
            <div class="kanban-socio-col">
                <div class="kanban-col-header" style="color: #47e299;">
                    <span>🏁 Concluídos</span>
                    <span class="status-badge-count" id="count-concluido">0</span>
                </div>
                <div class="kanban-dropzone" id="col-concluidos" data-status="concluido"></div>
            </div>
        </div>

        <div id="view-pessoas" class="fade-view" style="display: none; padding: 0 40px;">
        <div class="workload-grid" id="workload-container">
            </div>
    </div>

        <div id="view-cronograma" class="fade-view" style="display: none; padding: 0 40px;">
            <div id="gantt-master-container"></div>
        </div>

        <div id="view-calendario" class="fade-view" style="display: none; padding: 0 40px;">
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <div class="calendar-title" id="cal-month-year">Abril 2026</div>
                <div class="calendar-nav">
                    <button class="btn-import" onclick="mudarMes(-1)">← Anterior</button>
                    <button class="btn-import" onclick="irParaHoje()">Hoje</button>
                    <button class="btn-import" onclick="mudarMes(1)">Próximo →</button>
                </div>
            </div>
            <div class="calendar-grid">
                <div class="calendar-day-name">Seg</div>
                <div class="calendar-day-name">Ter</div>
                <div class="calendar-day-name">Qua</div>
                <div class="calendar-day-name">Qui</div>
                <div class="calendar-day-name">Sex</div>
                <div class="calendar-day-name">Sáb</div>
                <div class="calendar-day-name">Dom</div>
            </div>
            <div class="calendar-grid" id="calendar-body">
                </div>
        </div>
    </div>

        <div id="modal-projeto" class="modal-overlay" onclick="fecharModalProjeto(event)">
            <div class="modal-content" style="max-width: 1100px; width: 95%; text-align: left; max-height: 90vh; overflow-y: auto; background: rgba(15,15,15,0.98); border: 1px solid rgba(255,193,7,0.3); box-shadow: 0 30px 80px rgba(0,0,0,0.9);" onclick="event.stopPropagation()">
                <button class="sp-close" onclick="fecharModalProjeto(event)" style="position:absolute; top:20px; right:20px;">✕</button>
                
                <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; margin-bottom: 25px;">
                    <div style="flex-grow: 1; padding-right: 20px;">
                        <input type="text" id="modal-proj-cliente" class="edit-input" style="font-size: 14px; color: #FFC107; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; background: transparent; border: none; padding: 0; box-shadow: none;" placeholder="NOME DO CLIENTE">
                        <input type="text" id="modal-proj-nome" class="edit-input" style="font-size: 32px; color: white; font-weight: 800; background: transparent; border: none; padding: 0; box-shadow: none; letter-spacing: -1px;" placeholder="Nome do Projeto Estratégico">
                    </div>
                    
                    <div style="display: flex; align-items: center; background: rgba(255,193,7,0.1); padding: 12px 18px; border-radius: 8px; border: 1px solid rgba(255,193,7,0.3);">
                        <label style="font-size: 14px; color: #FFC107; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700;">
                            <input type="checkbox" id="modal-proj-visivel" style="accent-color: #FFC107; width: 18px; height: 18px; cursor: pointer;">
                            👁️ Exibir no Hub da Equipe
                        </label>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1.8fr; gap: 35px;">
                    <div style="display: flex; flex-direction: column; gap: 18px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                        <div>
                            <label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">👤 Líder do Projeto</label>
                            <input type="text" id="modal-lider" class="edit-input" placeholder="Comece a digitar o nome..." list="lista-nomes-datalist" autocomplete="off">
                            <datalist id="lista-nomes-datalist"></datalist>
                        </div>
                        <div><label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">📝 Escopo Estratégico</label>
                        <textarea id="modal-desc" class="edit-textarea" placeholder="Detalhes gerais do projeto..."></textarea></div>
                        <div><label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">🏷️ Tags</label>
                        <input type="text" id="modal-tags" class="edit-input" placeholder="Ex: Financeiro, TI (vírgula)"></div>
                        <div style="position: relative;">
                            <label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">👥 Equipe (Separe com vírgula)</label>
                            <input type="text" id="modal-equipe" class="edit-input" placeholder="Digite um nome..." autocomplete="off">
                        </div>
                    </div>

                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
                            <h3 style="font-size: 16px; color: white; font-weight: 700; display: flex; align-items: center; gap: 10px;">📋 Tarefas, Prazos e Kick-off</h3>
                            <button class="sp-btn-edit" style="background: rgba(131,46,255,0.2); color: #c5a3ff; border-color: var(--cadarn-roxo);" onclick="adicionarNovaTarefaModal()">➕ Nova Tarefa</button>
                        </div>
                        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; font-size: 11px; font-weight: 700; color: var(--cadarn-cinza); text-transform: uppercase; padding: 0 10px 10px 10px;">
                            <div>Descrição</div> <div>Responsável</div> <div>Prazo</div> <div>Status</div> <div></div>
                        </div>
                        <div id="lista-tarefas" style="max-height: 480px; overflow-y: auto; padding-right: 8px; display: flex; flex-direction: column; gap: 10px;"></div>
                    </div>
                </div>

                <div style="margin-top: 35px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: flex-end; gap: 15px;">
                    <button class="sp-btn-edit" style="background: transparent; color: var(--cadarn-cinza); border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px;" onclick="fecharModalProjeto()">Cancelar Rascunho</button>
                    <button class="btn-present" style="background: linear-gradient(135deg, #198754, #157347); border: none; font-size: 15px; padding: 12px 30px; box-shadow: 0 5px 20px rgba(25,135,84,0.4);" onclick="salvarProjetoSocio()">💾 Salvar Projeto Definitivo</button>
                </div>
            </div>
        </div>
        </div>

    <script type="module" src="js/app-socios.js"></script>
</body>
</html>
