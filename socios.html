<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADARN | Hub Estratégico - Área do Sócio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        .socio-header-badge { background: linear-gradient(135deg, #FFC107, #FF9800); color: #000; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 10px rgba(255, 193, 7, 0.4); }
        .fade-view { transition: opacity 0.3s ease; opacity: 1; }
        
        .kanban-socio-board { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; align-items: flex-start; }
        .kanban-socio-col { flex: 1; min-width: 300px; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; min-height: 60vh; }
        .kanban-dropzone { min-height: 100px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .sortable-ghost { opacity: 0.4; background-color: rgba(131, 46, 255, 0.1); border: 2px dashed var(--cadarn-roxo); border-radius: 10px; }

        .workload-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .wl-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; }
        .wl-card:hover { border-color: rgba(131, 46, 255, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .wl-status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .wl-status-ocioso { background: rgba(71, 226, 153, 0.1); color: #47e299; border: 1px solid rgba(71, 226, 153, 0.3); }
        .wl-status-ideal { background: rgba(131, 46, 255, 0.1); color: #c5a3ff; border: 1px solid rgba(131, 46, 255, 0.3); }
        .wl-status-sobrecarga { background: rgba(220, 53, 69, 0.1); color: #ff8793; border: 1px solid rgba(220, 53, 69, 0.3); }
        .wl-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wl-stat-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        
        .task-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border-color); }
        .task-row input, .task-row select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 6px; font-size: 13px; font-family: 'Inter'; transition: 0.3s; }
        .task-row input:focus, .task-row select:focus { border-color: var(--cadarn-roxo); box-shadow: 0 0 10px rgba(131,46,255,0.2); outline: none; }

        /* Estilos do Autocomplete Inteligente */
        .autocomplete-items { position: absolute; border: 1px solid var(--cadarn-roxo); border-top: none; z-index: 99; top: 100%; left: 0; right: 0; border-radius: 0 0 8px 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.8); background-color: rgba(15,15,15,0.98); max-height: 200px; overflow-y: auto; }
        .autocomplete-items div { padding: 12px; cursor: pointer; color: white; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; font-weight: 500; }
        .autocomplete-items div:hover { background-color: rgba(131, 46, 255, 0.2); color: #c5a3ff; }
        .autocomplete-active { background-color: rgba(131, 46, 255, 0.4) !important; color: #ffffff; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>

    <header>
        <div class="brand-container">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:15px; color:inherit;">
                <div class="logo-text">CADARN <span>HUB</span></div>
                <div class="socio-header-badge">Área do Sócio</div>
            </a>
        </div>
        <div class="header-controls">
            <a href="index.html" class="sp-btn-edit" style="text-decoration: none; border-color: var(--cadarn-cinza); color: var(--cadarn-cinza); background: rgba(255,255,255,0.05);">← Voltar ao Hub</a>
        </div>
    </header>

    <div class="container" style="display: none;" id="conteudo-restrito">
        
        <div class="card anim-1" style="padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div class="view-toggle" style="background: rgba(0,0,0,0.3); padding: 5px;">
                <button class="view-btn active" id="tab-btn-projetos" onclick="switchTab('projetos')">📊 Pipeline Estratégico</button>
                <button class="view-btn" id="tab-btn-pessoas" onclick="switchTab('pessoas')">👥 Carga (Workload)</button>
            </div>

            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 12px; font-weight: 600; color: var(--cadarn-cinza);">Filtro:</span>
                    <select id="filtro-responsavel" class="edit-select" style="margin:0; padding:8px 15px; font-size: 13px; border-radius: 8px;" onchange="aplicarFiltros()">
                        <option value="">Todos da Equipe</option>
                    </select>
                </div>
                <button class="btn-present" onclick="novoProjetoSocio()" style="background: linear-gradient(135deg, #198754, #157347); border-color: #198754; box-shadow: 0 4px 15px rgba(25, 135, 84, 0.3);">
                    ➕ Criar Projeto Estratégico
                </button>
            </div>
        </div>

        <div id="view-projetos" class="fade-view anim-2">
            <div class="kanban-socio-board">
                <div class="kanban-socio-col">
                    <div class="kanban-col-header" style="color: #6c757d;">🤝 Em Negociação / Backlog <span class="status-dot dot-pendente" style="margin:0;"></span></div>
                    <div class="kanban-dropzone" id="col-negociacao" data-status="negociacao"></div>
                </div>
                <div class="kanban-socio-col" style="background: rgba(182, 138, 255, 0.05); border-color: rgba(182, 138, 255, 0.1);">
                    <div class="kanban-col-header" style="color:#b68aff;">🚀 Ativos (Delivery) <span class="status-dot dot-ativo" style="margin:0;"></span></div>
                    <div class="kanban-dropzone" id="col-andamento" data-status="andamento"></div>
                </div>
                <div class="kanban-socio-col" style="background: rgba(71, 226, 153, 0.05); border-color: rgba(71, 226, 153, 0.1);">
                    <div class="kanban-col-header" style="color:#47e299;">🏁 Concluídos <span class="status-dot dot-concluido" style="margin:0;"></span></div>
                    <div class="kanban-dropzone" id="col-concluidos" data-status="concluido"></div>
                </div>
            </div>
        </div>

        <div id="view-pessoas" class="fade-view anim-2" style="display: none;">
            <div class="card">
                <h2 class="section-header"><div class="section-header-title">Matriz de Carga de Trabalho da Equipe</div></h2>
                <div class="workload-grid" id="workload-container"></div>
            </div>
        </div>

    </div>

    <div id="modal-projeto" class="modal-overlay" onclick="fecharModalProjeto(event)">
        <div class="modal-content" style="max-width: 1100px; width: 95%; text-align: left; max-height: 90vh; overflow-y: auto; background: rgba(15,15,15,0.98); border: 1px solid rgba(255,193,7,0.3); box-shadow: 0 30px 80px rgba(0,0,0,0.9);" onclick="event.stopPropagation()">
            <button class="sp-close" onclick="fecharModalProjeto(event)" style="position:absolute; top:20px; right:20px;">✕</button>
            
            <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; margin-bottom: 25px;">
                <div style="flex-grow: 1; padding-right: 20px;">
                    <input type="text" id="modal-proj-cliente" class="edit-input" style="font-size: 14px; color: #FFC107; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; background: transparent; border: none; padding: 0; box-shadow: none;" placeholder="NOME DO CLIENTE">
                    <input type="text" id="modal-proj-nome" class="edit-input" style="font-size: 32px; color: white; font-weight: 800; background: transparent; border: none; padding: 0; box-shadow: none; letter-spacing: -1px;" placeholder="Nome do Projeto Estratégico">
                </div>
                
                <div style="display: flex; align-items: center; background: rgba(255,193,7,0.1); padding: 12px 18px; border-radius: 8px; border: 1px solid rgba(255,193,7,0.3);">
                    <label style="font-size: 14px; color: #FFC107; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700;">
                        <input type="checkbox" id="modal-proj-visivel" style="accent-color: #FFC107; width: 18px; height: 18px; cursor: pointer;">
                        👁️ Exibir no Hub da Equipe
                    </label>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1.8fr; gap: 35px;">
                <div style="display: flex; flex-direction: column; gap: 18px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                    
                    <div>
                        <label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">👤 Líder do Projeto</label>
                        <input type="text" id="modal-lider" class="edit-input" placeholder="Comece a digitar o nome..." list="lista-nomes-datalist" autocomplete="off">
                        <datalist id="lista-nomes-datalist"></datalist>
                    </div>
                    
                    <div><label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">📝 Escopo Estratégico</label>
                    <textarea id="modal-desc" class="edit-textarea" placeholder="Detalhes do projeto..."></textarea></div>

                    <div><label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">🏷️ Tags</label>
                    <input type="text" id="modal-tags" class="edit-input" placeholder="Ex: Financeiro, TI (vírgula)"></div>

                    <div style="position: relative;">
                        <label style="font-size: 11px; color: var(--cadarn-cinza); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">👥 Equipe (Separe com vírgula)</label>
                        <input type="text" id="modal-equipe" class="edit-input" placeholder="Digite um nome..." autocomplete="off">
                    </div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
                        <h3 style="font-size: 16px; color: white; font-weight: 700; display: flex; align-items: center; gap: 10px;">📋 Tarefas e Prazos</h3>
                        <button class="sp-btn-edit" style="background: rgba(131,46,255,0.2); color: #c5a3ff; border-color: var(--cadarn-roxo);" onclick="adicionarNovaTarefaModal()">➕ Nova Tarefa</button>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; font-size: 11px; font-weight: 700; color: var(--cadarn-cinza); text-transform: uppercase; padding: 0 10px 10px 10px;">
                        <div>Descrição</div> <div>Responsável</div> <div>Prazo</div> <div>Status</div> <div></div>
                    </div>
                    
                    <div id="lista-tarefas" style="max-height: 380px; overflow-y: auto; padding-right: 8px; display: flex; flex-direction: column; gap: 10px;"></div>
                </div>
            </div>

            <div style="margin-top: 35px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: flex-end; gap: 15px;">
                <button class="sp-btn-edit" style="background: transparent; color: var(--cadarn-cinza); border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px;" onclick="fecharModalProjeto()">Cancelar Rascunho</button>
                <button class="btn-present" style="background: linear-gradient(135deg, #198754, #157347); border: none; font-size: 15px; padding: 12px 30px; box-shadow: 0 5px 20px rgba(25,135,84,0.4);" onclick="salvarProjetoSocio()">💾 Salvar Projeto Definitivo</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app-socios.js"></script>
</body>
</html>
