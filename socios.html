<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADARN | Hub Estratégico - Área do Sócio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
    :root {
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --premium-gold: linear-gradient(135deg, #FFC107, #FF9800);
        --premium-roxo: #832EFF;
    }

    body { background-color: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }

    /* Efeito de Iluminação de Fundo */
    .ambient-glow {
        position: fixed; top: -10%; left: 50%; transform: translateX(-50%);
        width: 80vw; height: 50vh;
        background: radial-gradient(circle, rgba(131, 46, 255, 0.08) 0%, transparent 70%);
        pointer-events: none; z-index: -1;
    }

    header {
        padding: 20px 40px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid var(--glass-border);
        backdrop-filter: blur(10px); background: rgba(0,0,0,0.4);
    }

    .socio-badge {
        background: var(--premium-gold); color: #000;
        padding: 5px 15px; border-radius: 30px;
        font-size: 10px; font-weight: 900; text-transform: uppercase;
        letter-spacing: 1.5px; box-shadow: 0 0 20px rgba(255, 193, 7, 0.2);
    }

    /* 1. Animação de Ouro Metálico no Selo VIP */
.socio-badge {
    background: linear-gradient(90deg, #FFC107 0%, #FFF3E0 50%, #FF9800 100%);
    background-size: 200% auto;
    color: #000;
    padding: 6px 16px; 
    border-radius: 30px;
    font-family: 'Outfit', sans-serif; /* Fonte nova! */
    font-size: 11px; 
    font-weight: 900; 
    text-transform: uppercase;
    letter-spacing: 1.5px; 
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
    animation: shine-gold 3s linear infinite; /* Efeito de brilho animado */
}

@keyframes shine-gold {
    to { background-position: 200% center; }
}

/* 2. Aplicando a fonte Premium nos Títulos do Sócio */
.capacity-header, .kanban-col-header, .sp-title, #modal-proj-nome, #modal-proj-cliente {
    font-family: 'Outfit', sans-serif;
    letter-spacing: -0.5px;
}

/* 3. Efeito de Vidro Jateado (Inner Shadow) nos Cards do Kanban */
.kanban-card {
    background: rgba(25, 25, 25, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px; 
    padding: 20px; 
    margin-bottom: 15px;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    /* Sombras em camadas: uma escura fora, uma luz sutil dentro */
    box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}

.kanban-card:hover {
    background: rgba(30, 30, 30, 0.6);
    border-color: rgba(131, 46, 255, 0.4);
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
}

/* 4. Título dos Cards no Kanban mais elegantes */
.kanban-card-title {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 8px;
}

    /* === NOVA SEÇÃO PREMIUM: CENTRAL DE CAPACIDADE === */
    .capacity-center {
        margin: 25px 40px 0 40px;
        padding: 20px;
        background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(131, 46, 255, 0.02));
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        backdrop-filter: blur(15px);
    }

    .capacity-header {
        font-size: 10px;
        color: var(--cadarn-cinza);
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 1.5px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .capacity-header::after {
        content: ''; flex-grow: 1; height: 1px; background: var(--glass-border);
    }

    /* Estilo para a barra de rolagem horizontal dos colaboradores */
    #teamAvailabilityContainer::-webkit-scrollbar { height: 4px; }
    #teamAvailabilityContainer::-webkit-scrollbar-thumb { background: rgba(131, 46, 255, 0.3); border-radius: 10px; }

    /* Barra de Comando (Dashboard Header) */
    .dashboard-ctrl {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 16px; padding: 15px 25px;
        margin: 20px 40px 30px 40px; display: flex; align-items: center;
        justify-content: space-between; gap: 20px;
        backdrop-filter: blur(20px);
    }

    .nav-tabs {
        display: flex; background: rgba(0,0,0,0.4);
        padding: 5px; border-radius: 12px; border: 1px solid var(--glass-border);
    }

    .view-btn {
        background: transparent; border: none; color: #888;
        padding: 10px 20px; border-radius: 8px; cursor: pointer;
        font-size: 13px; font-weight: 600; transition: 0.3s;
    }

    .view-btn.active {
        background: rgba(255,255,255,0.07); color: #fff;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .action-group { display: flex; gap: 10px; align-items: center; }

    .btn-import {
        background: transparent; border: 1px solid var(--glass-border);
        color: #aaa; padding: 10px 18px; border-radius: 10px;
        font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }

    .btn-import:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: #666; }

    .btn-create {
        background: #fff; color: #000; border: none;
        padding: 12px 24px; border-radius: 12px;
        font-size: 13px; font-weight: 800; cursor: pointer;
        display: flex; align-items: center; gap: 8px;
        transition: 0.3s; box-shadow: 0 10px 25px rgba(255,255,255,0.1);
    }

    .btn-create:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255,255,255,0.2); }

    .kanban-socio-board { padding: 0 40px 40px 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }

    .kanban-socio-col {
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--glass-border);
        border-radius: 24px; padding: 25px;
        min-height: 70vh; display: flex; flex-direction: column;
    }

    .kanban-col-header {
        font-size: 12px; font-weight: 800; text-transform: uppercase;
        letter-spacing: 2px; margin-bottom: 25px; display: flex;
        align-items: center; justify-content: space-between;
    }

    .status-badge-count {
        background: rgba(255,255,255,0.05); padding: 4px 10px;
        border-radius: 20px; font-size: 10px; color: #666;
    }

    .kanban-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px; padding: 20px; margin-bottom: 15px;
        transition: 0.3s; cursor: pointer;
    }

    .kanban-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(131, 46, 255, 0.3);
        transform: scale(1.02);
    }

    .premium-select {
        background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
        color: #fff; padding: 10px 15px; border-radius: 10px;
        font-size: 13px; outline: none; cursor: pointer;
    }

    .workload-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
        gap: 25px; 
    }
    .calendar-wrapper { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--glass-border); }
    .calendar-grid { 
        display: grid; 
        grid-template-columns: repeat(7, 1fr);
        background: var(--glass-border); gap: 1px; 
    }
    .calendar-day-name { background: #0a0a0a; padding: 15px; font-size: 11px; font-weight: 800; color: #666; text-transform: uppercase; text-align: center; }
    .calendar-day { background: #0f0f0f; min-height: 120px; padding: 10px; transition: 0.2s; }
    .calendar-date { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: block; }
    .cal-task { background: rgba(131, 46, 255, 0.2); color: #c5a3ff; font-size: 10px; padding: 5px 8px; border-radius: 6px; margin-bottom: 4px; border-left: 3px solid var(--premium-roxo); }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="ambient-glow"></div>

    <div class="container" style="display: none;" id="conteudo-restrito">
        
        <header>
            <div class="brand-container">
                <div class="logo-text">CADARN <span>HUB</span></div>
                <div class="socio-badge">Acesso VIP Sócio</div>
            </div>
            <div class="header-controls">
                <a href="index.html" class="btn-create" style="text-decoration: none; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border);">← Voltar ao Hub</a>
            </div>
        </header>

        <div class="capacity-center">
            <div class="capacity-header">⚡ Central de Capacidade & Disponibilidade em Tempo Real</div>
            <div id="teamAvailabilityContainer" style="display: flex; gap: 18px; overflow-x: auto; padding-bottom: 10px;">
                </div>
        </div>

        <div class="dashboard-ctrl">
            <div class="nav-tabs">
                <button class="view-btn active" id="tab-btn-projetos" onclick="switchTab('projetos')">📊 Pipeline</button>
                <button class="view-btn" id="tab-btn-pessoas" onclick="switchTab('pessoas')">👥 Workload</button>
                <button class="view-btn" id="tab-btn-cronograma" onclick="switchTab('cronograma')">📈 Cronograma</button>
                <button class="view-btn" id="tab-btn-calendario" onclick="switchTab('calendario')">📅 Calendário</button>
            </div>

            <div class="action-group">
                <select id="filtro-responsavel" class="premium-select" onchange="aplicarFiltros()">
                    <option value="">Toda a Equipe</option>
                </select>
                
                <div style="display: flex; gap: 8px;">
                    <input type="file" id="file-import-pipe" accept=".csv" style="display:none" onchange="importarDados(event, 'pipe')">
                    <input type="file" id="file-import-projetos" accept=".csv" style="display:none" onchange="importarDados(event, 'projetos')">
                    
                    <button class="btn-import" onclick="document.getElementById('file-import-pipe').click()">📥 Pipe</button>
                    <button class="btn-import" onclick="document.getElementById('file-import-projetos').click()">📂 Projetos</button>
                </div>
                
                <button class="btn-create" onclick="novoProjetoSocio()">
                    <span>+</span> Criar Projeto
                </button>
            </div>
        </div>

        <div id="view-projetos" class="kanban-socio-board fade-view">
            <div class="kanban-socio-col">
                <div class="kanban-col-header" style="color: #ffc107;">
                    <span>🤝 Negociação</span>
                    <span class="status-badge-count" id="count-negociacao">0</span>
                </div>
                <div class="kanban-dropzone" id="col-negociacao" data-status="negociacao"></div>
            </div>
            <div class="kanban-socio-col">
                <div class="kanban-col-header" style="color: #b68aff;">
                    <span>🚀 Delivery</span>
                    <span class="status-badge-count" id="count-andamento">0</span>
                </div>
                <div class="kanban-dropzone" id="col-andamento" data-status="andamento"></div>
            </div>
            <div class="kanban-socio-col">
                <div class="kanban-col-header" style="color: #47e299;">
                    <span>🏁 Concluídos</span>
                    <span class="status-badge-count" id="count-concluido">0</span>
                </div>
                <div class="kanban-dropzone" id="col-concluidos" data-status="concluido"></div>
            </div>
        </div>

        <div id="view-pessoas" class="fade-view" style="display: none; padding: 0 40px;">
            <div class="workload-grid" id="workload-container"></div>
        </div>

        <div id="view-cronograma" class="fade-view" style="display: none; padding: 0 40px;">
            <div id="gantt-master-container"></div>
        </div>

        <div id="view-calendario" class="fade-view" style="display: none; padding: 0 40px;">
            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <div class="calendar-title" id="cal-month-year">Abril 2026</div>
                    <div class="calendar-nav">
                        <button class="btn-import" onclick="mudarMes(-1)">← Anterior</button>
                        <button class="btn-import" onclick="irParaHoje()">Hoje</button>
                        <button class="btn-import" onclick="mudarMes(1)">Próximo →</button>
                    </div>
                </div>
                <div class="calendar-grid">
                    <div class="calendar-day-name">Seg</div><div class="calendar-day-name">Ter</div><div class="calendar-day-name">Qua</div><div class="calendar-day-name">Qui</div><div class="calendar-day-name">Sex</div><div class="calendar-day-name">Sáb</div><div class="calendar-day-name">Dom</div>
                </div>
                <div class="calendar-grid" id="calendar-body"></div>
            </div>
        </div>

        <div id="modal-projeto" class="modal-overlay" onclick="fecharModalProjeto(event)">
            </div>

    </div>

    <script type="module" src="js/app-socios.js"></script>
</body>
</html>
