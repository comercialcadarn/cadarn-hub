<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADARN | Hub Estratégico - Área do Sócio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        .socio-header-badge { background: #FFC107; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Tabs e Filtros */
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .tab-btn { background: transparent; border: 1px solid transparent; color: var(--cadarn-cinza); padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover { background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: rgba(131, 46, 255, 0.15); color: var(--cadarn-branco); border-color: var(--cadarn-roxo); box-shadow: 0 0 15px rgba(131, 46, 255, 0.2); }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        
        /* Kanban */
        .kanban-socio-board { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; min-height: 60vh; align-items: flex-start; }
        .kanban-socio-col { flex: 1; min-width: 320px; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; max-height: 75vh; overflow-y: auto;}
        .col-negociacao { border-top: 3px solid #6c757d; }
        .col-andamento { border-top: 3px solid #b68aff; }
        .col-concluidos { border-top: 3px solid #47e299; }
        .kanban-dropzone { min-height: 150px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .sortable-ghost { opacity: 0.4; background-color: rgba(131, 46, 255, 0.2); border: 2px dashed var(--cadarn-roxo); }
        
        /* Workload (Pessoas) */
        .workload-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .wl-card { background: rgba(20,20,20,0.8); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .wl-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .wl-status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .wl-status-ocioso { background: rgba(71, 226, 153, 0.15); color: #47e299; border: 1px solid #47e299; }
        .wl-status-ideal { background: rgba(131, 46, 255, 0.15); color: #c5a3ff; border: 1px solid var(--cadarn-roxo); }
        .wl-status-sobrecarga { background: rgba(220, 53, 69, 0.15); color: #ff8793; border: 1px solid #dc3545; }
        .wl-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wl-stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; }
        .wl-tasks-list { max-height: 150px; overflow-y: auto; font-size: 12px; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;}
        
        /* Modal de Tarefas (Projetos) */
        .task-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .task-row input, .task-row select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; padding: 8px; border-radius: 6px; font-size: 12px; }
        .task-row input:focus, .task-row select:focus { border-color: var(--cadarn-roxo); outline: none; }
        .status-pendente { color: #6c757d; } .status-andamento { color: #b68aff; } .status-atrasado { color: #ff8793; } .status-concluido { color: #47e299; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>

    <header>
        <div class="brand-container">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:15px; color:inherit;">
                <div class="logo-text">CADARN <span>HUB</span></div>
                <div class="socio-header-badge">Área do Sócio</div>
            </a>
        </div>
        <div class="header-controls">
            <a href="index.html" class="sp-btn-edit" style="text-decoration: none; border-color: var(--cadarn-cinza); color: var(--cadarn-cinza);">← Voltar ao Hub Geral</a>
        </div>
    </header>

    <div class="container" style="display: none;" id="conteudo-restrito">
        
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-btn-projetos" onclick="switchTab('projetos')">📊 Pipeline e Tarefas</button>
            <button class="tab-btn" id="tab-btn-pessoas" onclick="switchTab('pessoas')">👥 Alocação e Carga (Workload)</button>
        </div>

        <div class="filter-bar">
            <span style="font-size: 12px; font-weight: 600; color: var(--cadarn-cinza);">Filtros:</span>
            <select id="filtro-responsavel" class="edit-select" style="margin:0; padding:8px 12px; font-size: 13px;" onchange="aplicarFiltros()">
                <option value="">Todos os Colaboradores</option>
            </select>
        </div>

        <div id="view-projetos">
            <div class="kanban-socio-board">
                <div class="kanban-socio-col col-negociacao">
                    <div class="kanban-col-header">🤝 Em Negociação / Backlog</div>
                    <div class="kanban-dropzone" id="col-negociacao" data-status="negociacao"></div>
                </div>

                <div class="kanban-socio-col col-andamento">
                    <div class="kanban-col-header" style="color:#b68aff;">🚀 Em Andamento (Delivery)</div>
                    <div class="kanban-dropzone" id="col-andamento" data-status="andamento"></div>
                </div>

                <div class="kanban-socio-col col-concluidos">
                    <div class="kanban-col-header" style="color:#47e299;">🏁 Concluídos</div>
                    <div class="kanban-dropzone" id="col-concluidos" data-status="concluido"></div>
                </div>
            </div>
        </div>

        <div id="view-pessoas" style="display: none;">
            <div class="workload-grid" id="workload-container">
                </div>
        </div>

    </div>

    <div id="modal-projeto" class="modal-overlay" onclick="fecharModalProjeto(event)">
        <div class="modal-content" style="max-width: 900px; width: 95%; text-align: left;" onclick="event.stopPropagation()">
            <button class="sp-close" onclick="fecharModalProjeto(event)" style="position:absolute; top:20px; right:20px;">✕</button>
            
            <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;">
                <div>
                    <div style="font-size: 12px; color: var(--cadarn-roxo-claro); font-weight: 700; text-transform: uppercase; margin-bottom: 5px;" id="modal-proj-cliente">Cliente</div>
                    <h2 style="font-size: 24px; color: white;" id="modal-proj-nome">Nome do Projeto</h2>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="font-size: 14px; color: var(--cadarn-cinza); text-transform: uppercase; letter-spacing: 1px;">Quadro de Tarefas</h3>
                <button class="sp-btn-edit" style="background: var(--cadarn-roxo); color: white;" onclick="adicionarNovaTarefa()">➕ Nova Tarefa</button>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; font-size: 11px; font-weight: 700; color: var(--cadarn-cinza); text-transform: uppercase; padding: 0 10px 5px 10px;">
                <div>Descrição da Tarefa</div>
                <div>Responsável</div>
                <div>Prazo (SLA)</div>
                <div>Status</div>
                <div>Ação</div>
            </div>

            <div id="lista-tarefas" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
                </div>
        </div>
    </div>

    <script type="module" src="js/app-socios.js"></script>
</body>
</html>
